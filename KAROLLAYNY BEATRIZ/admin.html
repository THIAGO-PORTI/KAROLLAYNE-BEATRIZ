<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Avaliações</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f9ff;
      font-family: 'Montserrat', sans-serif;
      padding: 2rem;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 30px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    h1 {
      color: #0369a1;
      margin-bottom: 1.5rem;
    }
    .login-box {
      text-align: center;
      padding: 2rem;
    }
    .login-box input {
      padding: 12px 20px;
      border: 2px solid #bae6fd;
      border-radius: 40px;
      width: 250px;
      margin-right: 10px;
    }
    .login-box button {
      padding: 12px 25px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
    }
    .hidden { display: none !important; }
    .avaliacao-card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border-left: 5px solid;
    }
    .pendente { border-color: #eab308; }
    .aprovado { border-color: #22c55e; opacity: 0.7; }
    .rejeitado { border-color: #ef4444; opacity: 0.5; }
    .estrelas { color: #fbbf24; font-size: 1.2rem; letter-spacing: 3px; }
    .acoes { margin-top: 15px; display: flex; gap: 10px; }
    .btn-aprovar {
      background: #22c55e;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
    }
    .btn-rejeitar {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-shield-alt"></i> Painel Administrativo</h1>

    <div id="loginSection" class="login-box">
      <p>Digite a senha para acessar</p>
      <input type="password" id="senhaInput" placeholder="Senha">
      <button id="btnLogin">Entrar</button>
      <div id="loginErro" style="color: red; margin-top: 10px;"></div>
    </div>

    <div id="adminSection" class="hidden">
      <div class="top-bar">
        <span><i class="fas fa-database"></i> <span id="totalCount">0</span> avaliações</span>
        <button id="btnSair" style="background: #94a3b8; color: white; border: none; padding: 8px 16px; border-radius: 30px;">Sair</button>
      </div>
      <div id="listaAvaliacoes"></div>
    </div>
  </div>

  <script>
    const JSONBIN_CONFIG = {
      accessKey: "$2a$10$.EUPvSrSzhLHlNWMg3rw4eEmvrbkj.DosfyVq7XfunZm2YDn/rIpC",
      binId: null,
      apiUrl: "https://api.jsonbin.io/v3/b"
    };
    const SENHA_ADMIN = "karollayny2024"; // Troque pela senha desejada

    let avaliacoesCache = [];

    // Login
    const loginSection = document.getElementById('loginSection');
    const adminSection = document.getElementById('adminSection');
    document.getElementById('btnLogin').addEventListener('click', () => {
      if (document.getElementById('senhaInput').value === SENHA_ADMIN) {
        loginSection.classList.add('hidden');
        adminSection.classList.remove('hidden');
        carregarAvaliacoes();
      } else {
        document.getElementById('loginErro').textContent = 'Senha incorreta!';
      }
    });

    document.getElementById('btnSair').addEventListener('click', () => {
      adminSection.classList.add('hidden');
      loginSection.classList.remove('hidden');
    });

    async function obterBinId() {
      let binId = localStorage.getItem('avaliacao_bin_id');
      if (!binId) {
        alert('Nenhum Bin configurado. Envie uma avaliação primeiro.');
        throw new Error('Bin não encontrado');
      }
      JSONBIN_CONFIG.binId = binId;
      return binId;
    }

    async function carregarAvaliacoes() {
      try {
        await obterBinId();
        const resp = await fetch(`${JSONBIN_CONFIG.apiUrl}/${JSONBIN_CONFIG.binId}/latest`, {
          headers: { 'X-Access-Key': JSONBIN_CONFIG.accessKey }
        });
        const data = await resp.json();
        avaliacoesCache = data.record || [];
        renderizarLista();
      } catch (erro) {
        console.error(erro);
        document.getElementById('listaAvaliacoes').innerHTML = '<p>Erro ao carregar.</p>';
      }
    }

    function renderizarLista() {
      const container = document.getElementById('listaAvaliacoes');
      const total = avaliacoesCache.length;
      document.getElementById('totalCount').textContent = total;
      
      const pendentes = avaliacoesCache.filter(a => a.status === 'PENDENTE');
      const processadas = avaliacoesCache.filter(a => a.status !== 'PENDENTE');
      
      let html = `<h3>⏳ Pendentes (${pendentes.length})</h3>`;
      pendentes.forEach((a, i) => { html += renderCard(a, i); });
      
      html += `<h3 style="margin-top: 30px;">✅ Processadas</h3>`;
      processadas.forEach((a, i) => { html += renderCard(a, i); });
      
      container.innerHTML = html || '<p>Nenhuma avaliação.</p>';
      
      // Adicionar eventos aos botões
      document.querySelectorAll('.btn-aprovar').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const index = e.target.dataset.index;
          await atualizarStatus(parseInt(index), 'APROVADO');
        });
      });
      document.querySelectorAll('.btn-rejeitar').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const index = e.target.dataset.index;
          await atualizarStatus(parseInt(index), 'REJEITADO');
        });
      });
    }

    function renderCard(avaliacao, index) {
      const statusClass = avaliacao.status === 'PENDENTE' ? 'pendente' : 
                          avaliacao.status === 'APROVADO' ? 'aprovado' : 'rejeitado';
      const botoes = avaliacao.status === 'PENDENTE' ? `
        <div class="acoes">
          <button class="btn-aprovar" data-index="${index}"><i class="fas fa-check"></i> Aprovar</button>
          <button class="btn-rejeitar" data-index="${index}"><i class="fas fa-times"></i> Rejeitar</button>
        </div>
      ` : `<p><i class="fas fa-info-circle"></i> Status: ${avaliacao.status}</p>`;
      
      return `
        <div class="avaliacao-card ${statusClass}">
          <strong>${avaliacao.nome}</strong> - ${avaliacao.data || ''}
          <div class="estrelas">${'★'.repeat(avaliacao.nota)}${'☆'.repeat(5-avaliacao.nota)}</div>
          <p>"${avaliacao.comentario}"</p>
          <small>Conheceu por: ${avaliacao.comoConheceu || 'N/I'} | Voltaria: ${avaliacao.voltaria || 'N/I'}</small><br>
          <small>Contato: ${avaliacao.email || 'N/I'} | ${avaliacao.telefone || 'N/I'}</small>
          ${botoes}
        </div>
      `;
    }

    async function atualizarStatus(indexOriginal, novoStatus) {
      try {
        avaliacoesCache[indexOriginal].status = novoStatus;
        
        const resp = await fetch(`${JSONBIN_CONFIG.apiUrl}/${JSONBIN_CONFIG.binId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Access-Key': JSONBIN_CONFIG.accessKey
          },
          body: JSON.stringify(avaliacoesCache)
        });
        
        if (!resp.ok) throw new Error('Falha ao atualizar');
        
        renderizarLista();
      } catch (erro) {
        alert('Erro ao atualizar status.');
      }
    }
  </script>
</body>
</html>
