<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo · Dra. Karollayny</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f9ff;
      font-family: 'Montserrat', sans-serif;
      padding: 2rem;
      min-height: 100vh;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 40px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    h1 {
      color: #0369a1;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .login-box {
      text-align: center;
      padding: 2rem;
    }
    .login-box input {
      padding: 12px 20px;
      font-size: 1rem;
      border: 2px solid #bae6fd;
      border-radius: 40px;
      width: 250px;
      margin-right: 10px;
    }
    .login-box button {
      padding: 12px 25px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
    }
    .hidden { display: none !important; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .btn-sair {
      background: #94a3b8;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-atualizar {
      background: #0284c7;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      margin-right: 10px;
    }
    .avaliacao-card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
      border-left: 6px solid #eab308;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }
    .avaliacao-card.aprovado { border-left-color: #22c55e; opacity: 0.8; }
    .avaliacao-card.rejeitado { border-left-color: #ef4444; opacity: 0.6; }
    .avaliacao-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .avaliacao-header strong {
      color: #0369a1;
      font-size: 1.2rem;
    }
    .estrelas {
      color: #fbbf24;
      letter-spacing: 3px;
      font-size: 1.2rem;
    }
    .avaliacao-comentario {
      margin: 12px 0;
      color: #1e3a5f;
      line-height: 1.5;
      font-style: italic;
    }
    .avaliacao-info {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 0.85rem;
      color: #475569;
      margin-bottom: 15px;
    }
    .acoes {
      display: flex;
      gap: 10px;
    }
    .btn-aprovar {
      background: #22c55e;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-rejeitar {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
    }
    .status-badge {
      background: #eab308;
      color: white;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-badge.aprovado { background: #22c55e; }
    .status-badge.rejeitado { background: #ef4444; }
    .loading {
      text-align: center;
      padding: 2rem;
      color: #0284c7;
    }
    .msg-erro {
      color: #dc2626;
      margin-top: 10px;
    }
    .filtros {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .filtro-btn {
      background: #e2e8f0;
      border: none;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 500;
    }
    .filtro-btn.active {
      background: #0284c7;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-shield-alt"></i> Painel Administrativo</h1>

    <!-- Tela de Login -->
    <div id="loginSection" class="login-box">
      <p style="margin-bottom: 20px; color: #0369a1;">Digite a senha para acessar</p>
      <input type="password" id="senhaInput" placeholder="Senha">
      <button id="btnLogin"><i class="fas fa-lock"></i> Entrar</button>
      <div id="loginErro" class="msg-erro"></div>
    </div>

    <!-- Área Administrativa -->
    <div id="adminSection" class="hidden">
      <div class="top-bar">
        <div>
          <button id="btnAtualizar" class="btn-atualizar"><i class="fas fa-sync-alt"></i> Atualizar</button>
          <span id="totalAvaliacoes">0 avaliações</span>
        </div>
        <button id="btnSair" class="btn-sair"><i class="fas fa-sign-out-alt"></i> Sair</button>
      </div>

      <div class="filtros">
        <button class="filtro-btn active" data-filtro="todos">Todos</button>
        <button class="filtro-btn" data-filtro="PENDENTE">Pendentes</button>
        <button class="filtro-btn" data-filtro="APROVADO">Aprovados</button>
        <button class="filtro-btn" data-filtro="REJEITADO">Rejeitados</button>
      </div>

      <div id="listaAvaliacoes" class="loading">
        <i class="fas fa-spinner fa-spin"></i> Carregando avaliações...
      </div>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ========== CONFIGURAÇÃO ==========
      const JSONBIN_CONFIG = {
        binId: "69dfbb14aaba88219701b2df",        // Seu Bin ID
        accessKey: "$2a$10$ruJXREBGaC.Q2kws5uHE6OT1rYbPNULg1Sk7Pw6wm5X7ScI6IdThq", // Sua Access Key
        apiUrl: "https://api.jsonbin.io/v3/b"
      };
      
      const SENHA_ADMIN = "karollayny2024"; // Senha para acessar o painel

      // ========== ELEMENTOS ==========
      const loginSection = document.getElementById('loginSection');
      const adminSection = document.getElementById('adminSection');
      const senhaInput = document.getElementById('senhaInput');
      const btnLogin = document.getElementById('btnLogin');
      const loginErro = document.getElementById('loginErro');
      const btnSair = document.getElementById('btnSair');
      const btnAtualizar = document.getElementById('btnAtualizar');
      const listaEl = document.getElementById('listaAvaliacoes');
      const totalSpan = document.getElementById('totalAvaliacoes');
      const filtroBtns = document.querySelectorAll('.filtro-btn');

      let avaliacoesCache = [];
      let filtroAtual = 'todos';

      // ========== AUTENTICAÇÃO ==========
      if (sessionStorage.getItem('adminLogado') === 'true') {
        loginSection.classList.add('hidden');
        adminSection.classList.remove('hidden');
        carregarAvaliacoes();
      }

      btnLogin.addEventListener('click', () => {
        if (senhaInput.value === SENHA_ADMIN) {
          sessionStorage.setItem('adminLogado', 'true');
          loginSection.classList.add('hidden');
          adminSection.classList.remove('hidden');
          carregarAvaliacoes();
          loginErro.textContent = '';
        } else {
          loginErro.textContent = 'Senha incorreta!';
        }
      });

      senhaInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') btnLogin.click();
      });

      btnSair.addEventListener('click', () => {
        sessionStorage.removeItem('adminLogado');
        adminSection.classList.add('hidden');
        loginSection.classList.remove('hidden');
        senhaInput.value = '';
        senhaInput.focus();
      });

      // ========== FILTROS ==========
      filtroBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          filtroBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          filtroAtual = btn.dataset.filtro;
          renderizarLista();
        });
      });

      // ========== CARREGAR AVALIAÇÕES ==========
      async function carregarAvaliacoes() {
        listaEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Carregando...';
        try {
          const response = await fetch(`${JSONBIN_CONFIG.apiUrl}/${JSONBIN_CONFIG.binId}/latest`, {
            headers: { 'X-Access-Key': JSONBIN_CONFIG.accessKey }
          });
          if (!response.ok) throw new Error(`Erro ${response.status}`);
          const data = await response.json();
          avaliacoesCache = data.record || [];
          renderizarLista();
        } catch (erro) {
          console.error(erro);
          listaEl.innerHTML = `<p class="msg-erro">Erro ao carregar: ${erro.message}</p>`;
        }
      }

      function renderizarLista() {
        let avaliacoesFiltradas = avaliacoesCache;
        if (filtroAtual !== 'todos') {
          avaliacoesFiltradas = avaliacoesCache.filter(a => a.status === filtroAtual);
        }
        
        // Ordenar por data (mais recentes primeiro)
        avaliacoesFiltradas.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        
        totalSpan.textContent = `${avaliacoesFiltradas.length} avaliações`;
        
        if (avaliacoesFiltradas.length === 0) {
          listaEl.innerHTML = '<p style="text-align: center; padding: 2rem;">Nenhuma avaliação encontrada.</p>';
          return;
        }
        
        let html = '';
        avaliacoesFiltradas.forEach((av, index) => {
          const originalIndex = avaliacoesCache.findIndex(a => 
            a.timestamp === av.timestamp && a.nome === av.nome
          );
          const statusClass = av.status === 'APROVADO' ? 'aprovado' : 
                              av.status === 'REJEITADO' ? 'rejeitado' : '';
          const statusBadgeClass = av.status === 'APROVADO' ? 'aprovado' : 
                                    av.status === 'REJEITADO' ? 'rejeitado' : '';
          
          html += `
            <div class="avaliacao-card ${statusClass}" data-index="${originalIndex}">
              <div class="avaliacao-header">
                <div>
                  <strong>${escapeHtml(av.nome)}</strong>
                  <span class="status-badge ${statusBadgeClass}">${av.status || 'PENDENTE'}</span>
                </div>
                <div class="estrelas">${'★'.repeat(av.nota)}${'☆'.repeat(5 - av.nota)}</div>
              </div>
              <div class="avaliacao-comentario">"${escapeHtml(av.comentario)}"</div>
              <div class="avaliacao-info">
                <span><i class="far fa-calendar"></i> ${av.data || 'N/I'}</span>
                <span><i class="fas fa-info-circle"></i> Conheceu por: ${av.comoConheceu || 'N/I'}</span>
                <span><i class="fas fa-undo-alt"></i> Voltaria: ${av.voltaria || 'N/I'}</span>
                ${av.email ? `<span><i class="far fa-envelope"></i> ${escapeHtml(av.email)}</span>` : ''}
                ${av.telefone ? `<span><i class="fas fa-phone"></i> ${escapeHtml(av.telefone)}</span>` : ''}
              </div>
              ${av.status === 'PENDENTE' ? `
                <div class="acoes">
                  <button class="btn-aprovar" data-index="${originalIndex}"><i class="fas fa-check"></i> Aprovar</button>
                  <button class="btn-rejeitar" data-index="${originalIndex}"><i class="fas fa-times"></i> Rejeitar</button>
                </div>
              ` : ''}
            </div>
          `;
        });
        
        listaEl.innerHTML = html;
        
        // Adicionar eventos aos botões
        document.querySelectorAll('.btn-aprovar').forEach(btn => {
          btn.addEventListener('click', () => atualizarStatus(parseInt(btn.dataset.index), 'APROVADO'));
        });
        document.querySelectorAll('.btn-rejeitar').forEach(btn => {
          btn.addEventListener('click', () => atualizarStatus(parseInt(btn.dataset.index), 'REJEITADO'));
        });
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      async function atualizarStatus(index, novoStatus) {
        try {
          avaliacoesCache[index].status = novoStatus;
          
          const response = await fetch(`${JSONBIN_CONFIG.apiUrl}/${JSONBIN_CONFIG.binId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'X-Access-Key': JSONBIN_CONFIG.accessKey
            },
            body: JSON.stringify(avaliacoesCache)
          });
          
          if (!response.ok) throw new Error('Erro ao salvar');
          
          renderizarLista();
        } catch (erro) {
          alert('Erro ao atualizar status: ' + erro.message);
          await carregarAvaliacoes(); // Recarregar do servidor
        }
      }

      btnAtualizar.addEventListener('click', carregarAvaliacoes);
    })();
  </script>
</body>
</html>
